<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monster Reincarnation</title>
    <meta name="theme-color" content="#14141a" />
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 720px;
        margin: 0 auto;
        padding: 1rem;
        line-height: 1.6;
        color: #e8e8ea;
        background: #14141a;
        -webkit-text-size-adjust: 100%;
      }
      h1 { font-size: clamp(1.4rem, 6vw, 2rem); margin: 0.2rem 0 0.6rem; }
      h2 { font-size: clamp(1rem, 4.5vw, 1.25rem); margin: 0 0 0.5rem; }
      ul { padding-left: 1.2rem; margin: 0; }
      li { margin: 0.35rem 0; }
      .muted { color: #9a9aa6; margin: 0.2rem 0 1rem; }
      .panel {
        background: #1d1d26;
        border: 1px solid #2a2a36;
        border-radius: 12px;
        padding: 0.8rem 1rem;
        margin: 0.8rem 0;
      }
      .row { display: flex; justify-content: space-between; margin-bottom: 0.35rem; }
      .bar { height: 12px; border-radius: 6px; background: #2a2a36; overflow: hidden; }
      .bar-fill { height: 100%; transition: width 0.2s ease; }
      .controls { display: flex; flex-wrap: wrap; gap: 0.6rem; margin: 0.8rem 0; }
      button {
        flex: 1 1 auto;
        min-height: 48px;
        min-width: 120px;
        padding: 0.7rem 1rem;
        font-size: 1.05rem;
        border: 0;
        border-radius: 10px;
        background: #6d44d9;
        color: #fff;
        cursor: pointer;
        touch-action: manipulation;
      }
      button.ghost { background: #2a2a36; }
      button:active { opacity: 0.85; }
      .log { max-height: 220px; overflow-y: auto; font-size: 0.92rem; }
      .log div { padding: 0.15rem 0; border-bottom: 1px solid #20202a; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
